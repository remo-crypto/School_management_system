{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h2>Update Student (Admin No: {{ admin_no }})</h2>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label for="field" class="form-label">Field to Update</label>
                        <select class="form-control" id="field" name="field" required>
                            <option value="">Select Field</option>
                            <option value="name">Name</option>
                            <option value="gender">Gender</option>
                            <option value="class">Class</option>
                            <option value="father_name">Father's Name</option>
                            <option value="mother_name">Mother's Name</option>
                            <option value="contact_no">Contact No</option>
                            <option value="dob">Date of Birth</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="value" class="form-label">New Value</label>
                        <input type="text" class="form-control" id="value" name="value" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Update</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}</content>
