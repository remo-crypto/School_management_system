{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header">
                <h2>Add Exam Marks</h2>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label for="admin_no" class="form-label">Admin No</label>
                        <input type="text" class="form-control" id="admin_no" name="admin_no" required>
                    </div>
                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="physics" class="form-label">Physics (0-70)</label>
                                <input type="number" class="form-control" id="physics" name="physics" min="0" max="70" required>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="chemistry" class="form-label">Chemistry (0-70)</label>
                                <input type="number" class="form-control" id="chemistry" name="chemistry" min="0" max="70" required>
                            </div>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="biology" class="form-label">Biology (0-70)</label>
                                <input type="number" class="form-control" id="biology" name="biology" min="0" max="70" required>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="maths" class="form-label">Maths (0-80)</label>
                                <input type="number" class="form-control" id="maths" name="maths" min="0" max="80" required>
                            </div>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="cs" class="form-label">Computer Science (0-70)</label>
                                <input type="number" class="form-control" id="cs" name="cs" min="0" max="70" required>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="hindi" class="form-label">Hindi (0-80)</label>
                                <input type="number" class="form-control" id="hindi" name="hindi" min="0" max="80" required>
                            </div>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="english" class="form-label">English (0-80)</label>
                        <input type="number" class="form-control" id="english" name="english" min="0" max="80" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Add Marks</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}</content>
